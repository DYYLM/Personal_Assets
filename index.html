<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbbf24" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="个人资产管理" />
    <title>个人资产管理</title>
    <!-- 阿里巴巴普惠体 -->
    <link rel="preconnect" href="https://fonts.alibabafonts.com">
    <style>
      @font-face {
        font-family: 'AlimamaShuHeiTi';
        font-display: swap;
        src: local('AlimamaShuHeiTi-Bold'),
             local('阿里妈妈数黑体 Bold'),
             url('/fonts/AlimamaShuHeiTi-Bold.ttf') format('truetype');
        font-weight: bold;
      }
    </style>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
